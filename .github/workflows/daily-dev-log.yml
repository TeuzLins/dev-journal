name: Daily Dev Log

on:
  schedule:
    - cron: "17 12 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-dev-log:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar repositório
        uses: actions/checkout@v4

      - name: Atualizar log diário
        run: |
          DATA=$(TZ=America/Sao_Paulo date +'%d/%m/%Y')

          if grep -q "## $DATA" dev-log.md; then
            echo "Log de hoje já existe."
            exit 0
          fi

          {
            echo ""
            echo "## $DATA"
            echo ""
            echo "- Registro diário de estudos, projetos e evolução como dev."
          } >> dev-log.md

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add dev-log.md
          git commit -m "chore: atualiza dev-log diário"
          git push
